<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Abertura de Chamados</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        /* Força o fundo a permanecer escuro mesmo com preenchimento automático */
        input:-webkit-autofill,
        input:-webkit-autofill:hover, 
        input:-webkit-autofill:focus, 
        input:-webkit-autofill:active {
            -webkit-box-shadow: 0 0 0 30px #1e1e1e inset !important;
            -webkit-text-fill-color: white !important;
            transition: background-color 5000s ease-in-out 0s;
        }
        /* Corrigindo a cor do select e placeholder no estilo dark mode */
        select { -webkit-appearance: none; -moz-appearance: none; appearance: none; outline: none; border: none; box-shadow: none; }
        select:focus { outline: none; box-shadow: none; }
        select:invalid { color: #64748b; }
        option { background-color: #1e1e1e; color: #f8fafc; }
        input, textarea { outline: none !important; box-shadow: none !important; }
        /* Scrollbar customizada para combinar com o fundo escuro */
        ::-webkit-scrollbar { width: 6px; }
        ::-webkit-scrollbar-track { background: #131313; }
        ::-webkit-scrollbar-thumb { background: #333; border-radius: 10px; }
    </style>
</head>
<body class="bg-[#131313] min-h-screen selection:bg-[#303030]/60 font-sans text-slate-200 overflow-x-hidden">

    <div class="grid grid-cols-1 lg:grid-cols-2 min-h-screen">
                <div class="relative flex flex-col lg:items-center lg:justify-center overflow-hidden h-auto lg:h-full min-h-[30vh] lg:min-h-screen">
            <div class="absolute inset-0 z-10 p-6 md:p-12 lg:p-20 flex items-center justify-center lg:justify-start" style="background: linear-gradient(to bottom right, #8D3046, #254E70)">
                <div class="absolute top-0 left-0 w-72 h-72 bg-white/10 blur-[100px] rounded-full pointer-events-none"></div>

                <div class="w-full max-w-lg space-y-4 lg:space-y-8 relative z-20 text-center lg:text-left pt-8 lg:pt-0">
                    <div class="w-full h-px bg-white/30 hidden lg:block"></div>
                    <div>
                        <h2 class="text-2xl md:text-3xl lg:text-4xl font-black tracking-tighter text-white leading-tight">
                            Portal de<br class="hidden lg:block">Atendimento.
                        </h2>
                        <p class="text-white/80 text-xs md:text-sm lg:text-base mt-2 lg:mt-4 leading-relaxed font-medium max-w-sm mx-auto lg:mx-0 px-4 lg:px-0">
                            Faça sua solicitação de suporte de forma rápida. A equipe de tecnologia da OAB cuidará do resto.
                        </p>
                    </div>
                    <div class="w-full h-px bg-white/20 pt-4 lg:pt-8"></div>
                    <div class="flex items-center justify-between gap-4 px-6 lg:px-0">
                        <p class="text-[7px] md:text-[8px] text-white/50 font-bold uppercase tracking-[0.4em]">
                            © 2026 TI OAB CEARÁ
                        </p>
                        <a href="/login.html" class="text-[9px] text-white/20 hover:text-white/60 transition-colors font-bold uppercase tracking-widest">
                            Área do Agente
                        </a>
                    </div>
                </div>
            </div>
        </div>

        <div class="relative p-4 md:p-12 lg:px-20 flex flex-col items-center bg-[#131313] overflow-y-auto">

            <div class="w-full max-w-2xl mx-auto py-6 md:py-1">
                
                <!-- Navegação Superior -->
                <div class="flex justify-center mb-8 md:mb-12">
                    <div class="inline-flex bg-[#1e1e1e] p-1 rounded-2xl border border-white/5">
                        <button id="btnViewAbrir" onclick="alternarTela('abrir')" class="px-4 md:px-7 py-2.5 rounded-xl text-[8px] md:text-[9px] font-black uppercase tracking-widest transition-all bg-white text-black">
                            Abrir Chamado
                        </button>
                        <button id="btnViewConsultar" onclick="alternarTela('consultar')" class="px-4 md:px-7 py-2.5 rounded-xl text-[8px] md:text-[9px] font-black uppercase tracking-widest transition-all text-slate-500 hover:text-white">
                            Consultar Status
                        </button>
                    </div>
                </div>

                <div id="boxStatus" class="hidden items-center gap-2.5 p-4 text-xs font-semibold mb-8 rounded-lg">
                    <span id="textoStatus"></span>
                </div>

                <!-- VISTA: ABRIR CHAMADO -->
                <div id="viewAbrir" class="animate-in fade-in duration-500">
                    <div class="mb-10 text-center">
                        <h2 class="text-white text-2xl md:text-3xl font-bold tracking-tight">Novo Chamado</h2>
                        <p class="text-slate-500 text-[9px] font-bold uppercase tracking-[0.3em] mt-3">Preencha os campos abaixo</p>
                    </div>

                    <form id="chamadoForm" class="relative" enctype="multipart/form-data">
                        <div class="grid grid-cols-1 md:grid-cols-2 gap-x-6 gap-y-5 md:gap-y-6">
                            
                            <div class="md:col-span-2">
                                <label class="block text-[9px] font-bold uppercase text-slate-400 tracking-widest mb-1.5 ml-1">Seu Nome *</label>
                                <input type="text" id="nome" name="nome" required placeholder="Nome completo" class="w-full bg-[#1e1e1e] rounded-xl px-4 py-3.5 text-sm text-white placeholder-slate-600 border-none transition-all">
                            </div>

                            <div>
                                <label class="block text-[9px) font-bold uppercase text-slate-400 tracking-widest mb-1.5 ml-1">CPF *</label>
                                <input type="text" id="cpf" name="cpf" required placeholder="000.000.000-00" maxlength="14" class="w-full bg-[#1e1e1e] rounded-xl px-4 py-3.5 text-sm text-white placeholder-slate-600 border-none transition-all">
                            </div>

                            <div>
                                <label class="block text-[9px] font-bold uppercase text-slate-400 tracking-widest mb-1.5 ml-1">E-mail *</label>
                                <input type="email" id="email" name="email" required placeholder="email@exemplo.com" class="w-full bg-[#1e1e1e] rounded-xl px-4 py-3.5 text-sm text-white placeholder-slate-600 border-none transition-all">
                            </div>

                            <div>
                                <label class="block text-[9px] font-bold uppercase text-slate-400 tracking-widest mb-1.5 ml-1">Telefone *</label>
                                <input type="text" id="telefone" name="telefone" required placeholder="(00) 00000-0000" maxlength="15" class="w-full bg-[#1e1e1e] rounded-xl px-4 py-3.5 text-sm text-white placeholder-slate-600 border-none transition-all">
                            </div>

                            <div>
                                <label class="block text-[9px] font-bold uppercase text-slate-400 tracking-widest mb-1.5 ml-1">Número da OAB</label>
                                <input type="text" id="numero" name="numero" placeholder="00000" class="w-full bg-[#1e1e1e] rounded-xl px-4 py-3.5 text-sm text-white placeholder-slate-600 border-none transition-all">
                            </div>

                            <div class="md:col-span-2">
                                <label class="block text-[9px] font-bold uppercase text-slate-400 tracking-widest mb-1.5 ml-1">Assunto *</label>
                                <select id="assunto" name="assunto" required class="w-full bg-[#1e1e1e] rounded-xl px-4 py-3.5 text-sm text-white border-none transition-all cursor-pointer">
                                    <option value="" disabled selected class="text-slate-500">Selecione uma opção...</option>
                                    <option value="INSS/GERID">INSS/GERID</option>
                                    <option value="CADASTRO SAP">CADASTRO SAP</option>
                                </select>
                            </div>

                            <div class="md:col-span-2">
                                <label class="block text-[9px] font-bold uppercase text-slate-400 tracking-widest mb-1.5 ml-1">Anexar Imagens (Máx 4)</label>
                                <input type="file" id="inputImagens" accept="image/*" multiple class="w-full bg-[#1e1e1e] rounded-xl px-4 py-3.5 text-sm text-slate-400 file:mr-4 file:py-1.5 file:px-3 file:rounded-xl file:border-0 file:text-[9px] file:font-bold file:bg-white file:text-black hover:file:bg-slate-200 cursor-pointer border-none">
                                
                                <div id="previewContainer" class="flex flex-wrap gap-3 mt-3"></div>
                            </div>

                            <div class="md:col-span-2">
                                <label class="block text-[9px] font-bold uppercase text-slate-400 tracking-widest mb-1.5 ml-1">Descrição do Problema *</label>
                                <textarea id="descricao" name="descricao" rows="4" required placeholder="Descreva sua solicitação com detalhes..." class="w-full bg-[#1e1e1e] rounded-xl px-4 py-3.5 text-sm text-white placeholder-slate-600 border-none transition-all resize-none"></textarea>
                            </div>
                        </div>

                        <div class="mt-10 w-full">
                            <button type="submit" id="btnSubmit" class="w-full bg-white text-black py-3.5 rounded-xl font-black text-[9px] uppercase tracking-[0.2em] flex items-center justify-center hover:bg-slate-200 transition-colors disabled:opacity-50 border-none shadow-none">
                                Enviar Chamado
                            </button>
                        </div>
                    </form>
                </div>

                <!-- VISTA: CONSULTAR CHAMADO -->
                <div id="viewConsultar" class="hidden animate-in fade-in slide-in-from-bottom-4 duration-500">
                    <div class="mb-10 text-center">
                        <h2 class="text-white text-2xl md:text-3xl font-bold tracking-tight">Consultar Status</h2>
                        <p class="text-slate-500 text-[9px] font-bold uppercase tracking-[0.3em] mt-3">Acompanhe seu atendimento</p>
                    </div>

                    <div class="relative">
                        <div id="formConsulta">
                            <div class="grid grid-cols-1 md:grid-cols-1 gap-6">
                                <div>
                                    <label class="block text-[9px] font-bold uppercase text-slate-400 tracking-widest mb-1.5 ml-1">Protocolo ou ID do Chamado *</label>
                                    <div class="flex flex-col md:flex-row gap-3">
                                        <input type="text" id="inputProtocoloCentral" placeholder="Ex: 2026-CH1234" class="flex-1 bg-[#1e1e1e] rounded-xl px-4 py-3.5 text-sm text-white placeholder-slate-600 border-none outline-none focus:bg-white/5 transition-all">
                                        <button onclick="consultarChamadoCentral()" class="bg-white text-black px-8 py-3.5 rounded-xl font-black text-[9px] uppercase tracking-[0.2em] hover:bg-slate-200 transition-all shadow-none border-none">
                                            Consultar
                                        </button>
                                    </div>
                                </div>
                            </div>
                        </div>

                        <div id="resultadoConsultaCentral" class="hidden mt-10 pt-10 border-t border-white/5 animate-in fade-in duration-500">
                            <!-- Preenchido via JS -->
                        </div>
                    </div>
                </div>
            </div>
            </div>
        </div>
    </div>

    <script>
        // Máscaras (Inalteradas)
        document.getElementById('cpf').addEventListener('input', function(e) {
            let value = e.target.value.replace(/\D/g, '');
            if (value.length > 11) value = value.slice(0, 11);
            value = value.replace(/(\d{3})(\d)/, '$1.$2').replace(/(\d{3})(\d)/, '$1.$2').replace(/(\d{3})(\d{1,2})$/, '$1-$2');
            e.target.value = value;
        });

        document.getElementById('telefone').addEventListener('input', function(e) {
            let v = e.target.value.replace(/\D/g, ''); 
            if (v.length > 11) v = v.slice(0, 11); 
            if (v.length <= 2) e.target.value = v;
            else if (v.length <= 6) e.target.value = '(' + v.slice(0,2) + ') ' + v.slice(2);
            else if (v.length <= 10) e.target.value = '(' + v.slice(0,2) + ') ' + v.slice(2,6) + '-' + v.slice(6);
            else e.target.value = '(' + v.slice(0,2) + ') ' + v.slice(2,7) + '-' + v.slice(7);
        });

        function validaCPF(cpf) {
            cpf = cpf.replace(/[^\d]+/g, '');
            if (cpf.length !== 11 || /^(\d)\1{10}$/.test(cpf)) return false;
            let soma = 0; let resto;
            for (let i = 1; i <= 9; i++) soma += parseInt(cpf.substring(i - 1, i)) * (11 - i);
            resto = (soma * 10) % 11;
            if ((resto === 10) || (resto === 11)) resto = 0;
            if (resto !== parseInt(cpf.substring(9, 10))) return false;
            soma = 0;
            for (let i = 1; i <= 10; i++) soma += parseInt(cpf.substring(i - 1, i)) * (12 - i);
            resto = (soma * 10) % 11;
            if ((resto === 10) || (resto === 11)) resto = 0;
            if (resto !== parseInt(cpf.substring(10, 11))) return false;
            return true;
        }

        // --- SISTEMA DE UPLOAD COM PRÉVIA ---
        let arquivosSelecionados = [];
        const maxArquivos = 4;
        const inputImagens = document.getElementById('inputImagens');
        const previewContainer = document.getElementById('previewContainer');

        inputImagens.addEventListener('change', function(e) {
            const novosArquivos = Array.from(e.target.files);
            
            // Verifica se ultrapassou o limite
            if (arquivosSelecionados.length + novosArquivos.length > maxArquivos) {
                alert(`Você só pode anexar no máximo ${maxArquivos} imagens.`);
                inputImagens.value = ""; // Reseta o input atual
                return;
            }

            // Adiciona ao array global
            arquivosSelecionados = [...arquivosSelecionados, ...novosArquivos];
            atualizarPrevia();
            
            // Reseta o input para permitir selecionar a mesma imagem se o usuário deletar e quiser adicionar de novo
            inputImagens.value = ""; 
        });

        function atualizarPrevia() {
            previewContainer.innerHTML = ""; // Limpa a div

            arquivosSelecionados.forEach((arquivo, index) => {
                const reader = new FileReader();
                reader.onload = function(e) {
                    // Cria o container da miniatura
                    const div = document.createElement('div');
                    div.className = "relative w-20 h-20 rounded-lg overflow-hidden border border-[#8D3046]/30 shadow-lg";

                    // Cria a imagem
                    const img = document.createElement('img');
                    img.src = e.target.result;
                    img.className = "w-full h-full object-cover";

                    // Cria o botão de remover (X)
                    const btnRemover = document.createElement('button');
                    btnRemover.innerHTML = "×";
                    btnRemover.className = "absolute top-1 right-1 bg-red-600 text-white w-5 h-5 flex items-center justify-center rounded-full text-xs font-bold hover:bg-red-700 transition-colors";
                    btnRemover.type = "button"; // Evita submeter o formulário
                    btnRemover.onclick = () => removerArquivo(index);

                    div.appendChild(img);
                    div.appendChild(btnRemover);
                    previewContainer.appendChild(div);
                };
                reader.readAsDataURL(arquivo);
            });
        }

        function removerArquivo(index) {
            arquivosSelecionados.splice(index, 1); // Remove da array pelo indice
            atualizarPrevia(); // Renderiza de novo
        }

        // --- ENVIO DO FORMULÁRIO ---
        const boxStatus = document.getElementById('boxStatus');
        const textoStatus = document.getElementById('textoStatus');

        function mostrarStatus(mensagem, erro = false) {
            boxStatus.classList.remove('hidden');
            textoStatus.textContent = mensagem;
            if (erro) {
                boxStatus.className = "flex items-center gap-2.5 p-4 text-xs font-semibold mb-8 rounded-lg bg-red-500/10 text-red-400";
            } else {
                boxStatus.className = "flex items-center gap-2.5 p-4 text-xs font-semibold mb-8 rounded-lg bg-emerald-500/10 text-emerald-400";
            }
        }

        document.getElementById('chamadoForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            
            const btnSubmit = document.getElementById('btnSubmit');
            const cpfValue = document.getElementById('cpf').value;

            boxStatus.classList.add('hidden');

            if (!validaCPF(cpfValue)) {
                mostrarStatus('Por favor, insira um CPF válido.', true);
                return;
            }

            btnSubmit.innerHTML = '...';
            btnSubmit.disabled = true;

            // Criar o FormData e adicionar os dados manuais + as imagens acumuladas
            const formData = new FormData(e.target);
            
            // Remove o campo original vazio do formulário
            formData.delete('imagens'); 
            
            // Anexa os arquivos que o usuário acumulou na nossa variável JavaScript
            arquivosSelecionados.forEach((arquivo) => {
                formData.append('imagens', arquivo);
            });

            try {
                const response = await fetch('/api/chamados', {
                    method: 'POST',
                    body: formData
                });

                const result = await response.json();

                if (response.ok) {
                    mostrarStatus('Chamado enviado com sucesso!', false);
                    e.target.reset(); // Limpa textos
                    arquivosSelecionados = []; // Limpa array de imagens
                    atualizarPrevia(); // Limpa as miniaturas visuais
                } else {
                    mostrarStatus(result.error || 'Erro ao enviar chamado.', true);
                }
            } catch (error) {
                mostrarStatus('Falha na conexão com o servidor.', true);
            } finally {
                btnSubmit.innerHTML = 'Enviar';
                btnSubmit.disabled = false;
            }
        });

        // --- SISTEMA DE NAVEGAÇÃO ---
        function alternarTela(tela) {
            const viewAbrir = document.getElementById('viewAbrir');
            const viewConsultar = document.getElementById('viewConsultar');
            const btnAbrir = document.getElementById('btnViewAbrir');
            const btnConsultar = document.getElementById('btnViewConsultar');

            if (tela === 'abrir') {
                viewConsultar.classList.add('hidden');
                viewAbrir.classList.remove('hidden');
                btnAbrir.className = "px-6 py-3 rounded-xl text-[10px] font-black uppercase tracking-widest transition-all bg-white text-black text-center";
                btnConsultar.className = "px-6 py-3 rounded-xl text-[10px] font-black uppercase tracking-widest transition-all text-slate-500 hover:text-white text-center";
            } else {
                viewAbrir.classList.add('hidden');
                viewConsultar.classList.remove('hidden');
                btnConsultar.className = "px-6 py-3 rounded-xl text-[10px] font-black uppercase tracking-widest transition-all bg-white text-black text-center";
                btnAbrir.className = "px-6 py-3 rounded-xl text-[10px] font-black uppercase tracking-widest transition-all text-slate-500 hover:text-white text-center";
            }
        }

        // --- SISTEMA DE CONSULTA CENTRALIZADA ---
        function limparConsulta() {
            document.getElementById('inputProtocoloCentral').value = '';
            document.getElementById('resultadoConsultaCentral').classList.add('hidden');
            document.getElementById('formConsulta').classList.remove('hidden');
        }

        async function consultarChamadoCentral() {
            const input = document.getElementById('inputProtocoloCentral');
            const resultado = document.getElementById('resultadoConsultaCentral');
            const formConsulta = document.getElementById('formConsulta');
            const id = input.value.trim();

            if (!id) return;

            resultado.classList.remove('hidden');
            resultado.innerHTML = '<p class="text-[9px] text-white/40 text-center animate-pulse py-10">Buscando informações...</p>';

            try {
                const response = await fetch(`/api/public/chamados/${id}`);
                const data = await response.json();

                if (response.ok) {
                    formConsulta.classList.add('hidden');
                    resultado.innerHTML = `
                        <div class="space-y-6 animate-in fade-in slide-in-from-top-4 duration-500">
                            <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
                                <div>
                                    <label class="block text-[9px] font-bold uppercase text-slate-400 tracking-widest mb-2 ml-1">Status Atual</label>
                                    <div class="bg-[#1e1e1e] rounded-xl px-4 py-4 text-sm font-black text-white uppercase tracking-widest border border-white/5">
                                        ${data.status}
                                    </div>
                                </div>
                                <div>
                                    <label class="block text-[9px] font-bold uppercase text-slate-400 tracking-widest mb-2 ml-1">Data de Abertura</label>
                                    <div class="bg-[#1e1e1e] rounded-xl px-4 py-4 text-sm text-slate-300">
                                        ${new Date(data.data).toLocaleDateString()}
                                    </div>
                                </div>
                                <div class="md:col-span-2">
                                    <label class="block text-[9px] font-bold uppercase text-slate-400 tracking-widest mb-2 ml-1">Assunto</label>
                                    <div class="bg-[#1e1e1e] rounded-xl px-4 py-4 text-sm text-white font-bold">
                                        ${data.assunto}
                                    </div>
                                </div>
                                <div class="md:col-span-2">
                                    <label class="block text-[9px] font-bold uppercase text-slate-400 tracking-widest mb-2 ml-1">Resposta do Técnico</label>
                                    <div class="bg-[#1e1e1e] rounded-xl px-4 py-5 text-sm leading-relaxed text-slate-200 italic border-l-2 border-[#8D3046]">
                                        "${data.observacao || 'O seu chamado foi recebido e está aguardando análise técnica. Em breve você receberá uma atualização.'}"
                                    </div>
                                </div>
                            </div>

                            <div class="pt-8 border-t border-white/5 flex flex-col md:flex-row items-center justify-between gap-6">
                                <p class="text-[9px] text-white/30 uppercase font-black tracking-[0.2em]">Protocolo: ${data.protocolo}</p>
                                <button onclick="limparConsulta()" class="w-full md:w-auto bg-white text-black px-8 py-3 rounded-xl font-black text-[9px] uppercase tracking-widest transition-colors">Nova Consulta</button>
                            </div>
                        </div>
                    `;
                } else {
                    resultado.innerHTML = `
                        <div class="py-10 text-center bg-red-500/5 rounded-2xl border border-red-500/10">
                            <p class="text-[9px] font-bold text-red-400 uppercase tracking-widest font-black">${data.error || 'Protocolo não encontrado'}</p>
                            <button onclick="limparConsulta()" class="mt-4 text-[8px] text-white/50 hover:text-white uppercase tracking-widest transition-colors font-bold underscores underline">Tentar novamente</button>
                        </div>
                    `;
                }
            } catch (err) {
                resultado.innerHTML = '<p class="text-[9px] text-red-400 font-bold text-center py-10 capitalize">Falha na conexão com o servidor.</p>';
            }
        }
    </script>
</body>
</html>
