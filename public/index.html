    <style>
        * { font-family: 'Inter', sans-serif; }
        /* Força o fundo a permanecer escuro mesmo com preenchimento automático */
        input:-webkit-autofill,
        input:-webkit-autofill:hover, 
        input:-webkit-autofill:focus, 
        input:-webkit-autofill:active {
            -webkit-box-shadow: 0 0 0 30px #1e1e1e inset !important;
            -webkit-text-fill-color: white !important;
            transition: background-color 5000s ease-in-out 0s;
        }
        /* Corrigindo a cor do select e placeholder no estilo dark mode */
        select { -webkit-appearance: none; -moz-appearance: none; appearance: none; outline: none; border: none; box-shadow: none; }
        select:focus { outline: none; box-shadow: none; }
        select:invalid { color: #64748b; }
        option { background-color: #1e1e1e; color: #f8fafc; }
        input, textarea { outline: none !important; box-shadow: none !important; }
        /* Scrollbar customizada para combinar com o fundo escuro */
        ::-webkit-scrollbar { width: 6px; }
        ::-webkit-scrollbar-track { background: #131313; }
        ::-webkit-scrollbar-thumb { background: #333; border-radius: 10px; }
    </style>
</head>

    <script>
        // Máscaras (Inalteradas)
        document.getElementById('cpf').addEventListener('input', function(e) {
            let value = e.target.value.replace(/\D/g, '');
            if (value.length > 11) value = value.slice(0, 11);
            value = value.replace(/(\d{3})(\d)/, '$1.$2').replace(/(\d{3})(\d)/, '$1.$2').replace(/(\d{3})(\d{1,2})$/, '$1-$2');
            e.target.value = value;
        });

        document.getElementById('telefone').addEventListener('input', function(e) {
            let v = e.target.value.replace(/\D/g, ''); 
            if (v.length > 11) v = v.slice(0, 11); 
            if (v.length <= 2) e.target.value = v;
            else if (v.length <= 6) e.target.value = '(' + v.slice(0,2) + ') ' + v.slice(2);
            else if (v.length <= 10) e.target.value = '(' + v.slice(0,2) + ') ' + v.slice(2,6) + '-' + v.slice(6);
            else e.target.value = '(' + v.slice(0,2) + ') ' + v.slice(2,7) + '-' + v.slice(7);
        });

        document.getElementById('inputBuscaUnica').addEventListener('input', function(e) {
            let value = e.target.value;
            // Se o usuário estiver digitando apenas números e não for um protocolo conhecido
            let numeric = value.replace(/\D/g, '');
            if (numeric.length > 0 && /^\d+$/.test(numeric) && numeric.length <= 11 && !value.includes('CH')) {
                 let v = numeric;
                 if (v.length > 11) v = v.slice(0, 11);
                 if (v.length > 9) v = v.replace(/(\d{3})(\d{3})(\d{3})(\d{1,2})/, '$1.$2.$3-$4');
                 else if (v.length > 6) v = v.replace(/(\d{3})(\d{3})(\d{1,3})/, '$1.$2.$3');
                 else if (v.length > 3) v = v.replace(/(\d{3})(\d{1,3})/, '$1.$2');
                 e.target.value = v;
            }
        });

        function validaCPF(cpf) {
            cpf = cpf.replace(/[^\d]+/g, '');
            if (cpf.length !== 11 || /^(\d)\1{10}$/.test(cpf)) return false;
            let soma = 0; let resto;
            for (let i = 1; i <= 9; i++) soma += parseInt(cpf.substring(i - 1, i)) * (11 - i);
            resto = (soma * 10) % 11;
            if ((resto === 10) || (resto === 11)) resto = 0;
            if (resto !== parseInt(cpf.substring(9, 10))) return false;
            soma = 0;
            for (let i = 1; i <= 10; i++) soma += parseInt(cpf.substring(i - 1, i)) * (12 - i);
            resto = (soma * 10) % 11;
            if ((resto === 10) || (resto === 11)) resto = 0;
            if (resto !== parseInt(cpf.substring(10, 11))) return false;
            return true;
        }

        // --- SISTEMA DE UPLOAD COM PRÉVIA ---
        let arquivosSelecionados = [];
        const maxArquivos = 4;
        const inputImagens = document.getElementById('inputImagens');
        const previewContainer = document.getElementById('previewContainer');

        inputImagens.addEventListener('change', function(e) {
            const novosArquivos = Array.from(e.target.files);
            const limiteTotal = 4 * 1024 * 1024; // 4MB Total
            
            // Calcula tamanho total atual + novos
            let tamanhoAtual = arquivosSelecionados.reduce((acc, arq) => acc + arq.size, 0);
            let tamanhoNovos = novosArquivos.reduce((acc, arq) => acc + arq.size, 0);

            if (tamanhoAtual + tamanhoNovos > limiteTotal) {
                alert(`O tamanho total dos arquivos excede o limite de 4MB.`);
                inputImagens.value = ""; 
                return;
            }

            // Verifica se ultrapassou o limite de quantidade
            if (arquivosSelecionados.length + novosArquivos.length > maxArquivos) {
                alert(`Você só pode anexar no máximo ${maxArquivos} arquivos.`);
                inputImagens.value = ""; 
                return;
            }

            // Adiciona ao array global
            arquivosSelecionados = [...arquivosSelecionados, ...novosArquivos];
            atualizarPrevia();
            
            // Reseta o input para permitir selecionar a mesma imagem se o usuário deletar e quiser adicionar de novo
            inputImagens.value = ""; 
        });

        function atualizarPrevia() {
            previewContainer.innerHTML = ""; 

            arquivosSelecionados.forEach((arquivo, index) => {
                const div = document.createElement('div');
                div.className = "relative w-20 h-20 rounded-lg overflow-hidden bg-white/5 shadow-lg flex items-center justify-center";

                if (arquivo.type === 'application/pdf') {
                    // Prévia para PDF
                    div.innerHTML = `
                        <div class="flex flex-col items-center justify-center gap-1">
                            <span class="text-[10px] font-black text-red-500">PDF</span>
                            <span class="text-[8px] text-white/40 truncate w-16 px-1 text-center">${arquivo.name}</span>
                        </div>
                    `;
                } else {
                    // Prévia para Imagem
                    const img = document.createElement('img');
                    img.className = "w-full h-full object-cover";
                    const reader = new FileReader();
                    reader.onload = (e) => img.src = e.target.result;
                    reader.readAsDataURL(arquivo);
                    div.appendChild(img);
                }

                // Botão de remover (X)
                const btnRemover = document.createElement('button');
                btnRemover.innerHTML = "×";
                btnRemover.className = "absolute top-1 right-1 bg-red-600 text-white w-5 h-5 flex items-center justify-center rounded-full text-xs font-bold hover:bg-red-700 transition-colors z-20";
                btnRemover.type = "button";
                btnRemover.onclick = (e) => {
                    e.stopPropagation();
                    removerArquivo(index);
                };

                div.appendChild(btnRemover);
                previewContainer.appendChild(div);
            });
        }

        function removerArquivo(index) {
            arquivosSelecionados.splice(index, 1); // Remove da array pelo indice
            atualizarPrevia(); // Renderiza de novo
        }

        // --- ENVIO DO FORMULÁRIO ---
        const boxStatus = document.getElementById('boxStatus');
        const textoStatus = document.getElementById('textoStatus');

        let statusTimeout;
        function mostrarStatus(mensagem, erro = false) {
            if (statusTimeout) clearTimeout(statusTimeout);
            
            boxStatus.classList.remove('hidden');
            textoStatus.textContent = mensagem;
            if (erro) {
                boxStatus.className = "flex items-center gap-2.5 p-4 text-xs font-semibold mb-8 rounded-lg bg-red-500/10 text-red-400";
            } else {
                boxStatus.className = "flex items-center gap-2.5 p-4 text-xs font-semibold mb-8 rounded-lg bg-emerald-500/10 text-emerald-400";
            }

            statusTimeout = setTimeout(() => {
                boxStatus.classList.add('hidden');
            }, 5000);
        }

        document.getElementById('chamadoForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            
            const btnSubmit = document.getElementById('btnSubmit');
            const cpfValue = document.getElementById('cpf').value;

            boxStatus.classList.add('hidden');

            if (!validaCPF(cpfValue)) {
                mostrarStatus('Por favor, insira um CPF válido.', true);
                return;
            }

            btnSubmit.innerHTML = '...';
            btnSubmit.disabled = true;

            // Criar o FormData e adicionar os dados manuais + as imagens acumuladas
            const formData = new FormData(e.target);
            
            // Remove o campo original vazio do formulário
            formData.delete('imagens'); 
            
            // Anexa os arquivos que o usuário acumulou na nossa variável JavaScript
            arquivosSelecionados.forEach((arquivo) => {
                formData.append('imagens', arquivo);
            });

            try {
                const response = await fetch('/api/chamados', {
                    method: 'POST',
                    body: formData
                });

                const result = await response.json();

                if (response.ok) {
                    mostrarStatus('Chamado enviado com sucesso!', false);
                    e.target.reset(); // Limpa textos
                    arquivosSelecionados = []; // Limpa array de imagens
                    atualizarPrevia(); // Limpa as miniaturas visuais
                } else {
                    mostrarStatus(result.error || 'Erro ao enviar chamado.', true);
                }
            } catch (error) {
                mostrarStatus('Falha na conexão com o servidor.', true);
            } finally {
                btnSubmit.innerHTML = 'Enviar';
                btnSubmit.disabled = false;
            }
        });

        // --- SISTEMA DE NAVEGAÇÃO ---
        function alternarTela(tela) {
            const vAbrir = document.getElementById('viewAbrir');
            const vConsultar = document.getElementById('viewConsultar');
            const vResolver = document.getElementById('viewResolver');
            const bAbrir = document.getElementById('btnViewAbrir');
            const bConsultar = document.getElementById('btnViewConsultar');
            const mainTitle = document.getElementById('mainTitle');
            const mainSubtitle = document.getElementById('mainSubtitle');

            [vAbrir, vConsultar, vResolver].forEach(v => v && v.classList.add('hidden'));

            if (tela === 'abrir') {
                if(vAbrir) vAbrir.classList.remove('hidden');
                if(bAbrir) bAbrir.className = "px-5 md:px-8 py-2.5 rounded-xl text-[8px] md:text-[9px] font-black uppercase tracking-widest transition-all bg-white text-black whitespace-nowrap";
                if(bConsultar) bConsultar.className = "px-5 md:px-8 py-2.5 rounded-xl text-[8px] md:text-[9px] font-black uppercase tracking-widest transition-all text-slate-500 hover:text-white whitespace-nowrap";
                if(mainTitle) mainTitle.textContent = "Novo Chamado";
                if(mainSubtitle) mainSubtitle.textContent = "Preencha os campos abaixo";
            } else if (tela === 'consultar') {
                if(vConsultar) vConsultar.classList.remove('hidden');
                if(bConsultar) bConsultar.className = "px-5 md:px-8 py-2.5 rounded-xl text-[8px] md:text-[9px] font-black uppercase tracking-widest transition-all bg-white text-black whitespace-nowrap";
                if(bAbrir) bAbrir.className = "px-5 md:px-8 py-2.5 rounded-xl text-[8px] md:text-[9px] font-black uppercase tracking-widest transition-all text-slate-500 hover:text-white whitespace-nowrap";
                if(mainTitle) mainTitle.textContent = "Consultar Status";
                if(mainSubtitle) mainSubtitle.textContent = "Acompanhe seu atendimento";
                
                const formC = document.getElementById('formConsulta');
                const resC = document.getElementById('resultadoConsultaCentral');
                
                // Só mostra o formulário de busca se os resultados estiverem escondidos
                if (formC && resC) {
                    if (resC.classList.contains('hidden')) {
                        formC.classList.remove('hidden');
                    } else {
                        formC.classList.add('hidden');
                    }
                }
            } else if (tela === 'resolver') {
                if(vResolver) vResolver.classList.remove('hidden');
                if(bAbrir) bAbrir.className = "px-5 md:px-8 py-2.5 rounded-xl text-[8px] md:text-[9px] font-black uppercase tracking-widest transition-all text-slate-500 hover:text-white whitespace-nowrap";
                if(bConsultar) bConsultar.className = "px-5 md:px-8 py-2.5 rounded-xl text-[8px] md:text-[9px] font-black uppercase tracking-widest transition-all text-slate-500 hover:text-white whitespace-nowrap";
                if(mainTitle) mainTitle.textContent = "Resolver Pendência";
                if(mainSubtitle) mainSubtitle.textContent = "Atualize as informações solicitadas";
                window.scrollTo(0,0);
            }
        }

        // --- SISTEMA DE CONSULTA CENTRALIZADA ---
        function limparConsulta() {
            document.getElementById('inputBuscaUnica').value = '';
            document.getElementById('resultadoConsultaCentral').classList.add('hidden');
            document.getElementById('formConsulta').classList.remove('hidden');
        }

        // --- CORES DINÂMICAS ---
        function getStatusColor(status) {
            const colors = {
                'Aberto': 'bg-blue-500/10 text-blue-500',
                'Em Atendimento': 'bg-purple-500/10 text-purple-500',
                'Pendente': 'bg-amber-500/10 text-amber-500',
                'Concluído': 'bg-emerald-500/10 text-emerald-500',
                'Cancelado': 'bg-red-500/10 text-red-500',
                'Informação Atualizada': 'bg-sky-500/10 text-sky-500',
                'Pendencia Concluída': 'bg-sky-500/10 text-sky-500'
            };
            return colors[status] || 'bg-slate-500/10 text-slate-500';
        }

        function getDotColor(status) {
            const dots = {
                'Aberto': 'bg-blue-500',
                'Em Atendimento': 'bg-purple-500',
                'Pendente': 'bg-amber-500',
                'Concluído': 'bg-emerald-500',
                'Cancelado': 'bg-red-500',
                'Pendencia Concluída': 'bg-sky-500'
            };
            return dots[status] || 'bg-slate-500';
        }

        async function consultarChamadoCentral() {
            const input = document.getElementById('inputBuscaUnica');
            const resultado = document.getElementById('resultadoConsultaCentral');
            const formConsulta = document.getElementById('formConsulta');
            
            const id = input.value.trim();

            if (!id) return;

            resultado.classList.remove('hidden');
            resultado.innerHTML = '<p class="text-[9px] text-white/40 text-center animate-pulse py-10">Buscando informações...</p>';

            try {
                const response = await fetch(`/api/public/chamados/${id}`);
                const data = await response.json();

                if (response.ok && data.length > 0) {
                    window.resultadosBusca = data; // Armazena globalmente sempre
                    
                    // Se encontrar apenas 1, mostra direto os detalhes
                    if (data.length === 1) {
                        return exibirDetalhesChamado(data[0]);
                    }
                    formConsulta.classList.add('hidden');
                    resultado.innerHTML = `
                        <div class="space-y-4 animate-in fade-in slide-in-from-top-4 duration-500 pb-10">
                            <h4 class="text-[10px] font-black text-white/30 uppercase tracking-[0.3em] mb-6">Foram encontrados ${data.length} chamados:</h4>
                            <div class="grid grid-cols-1 gap-4">
                                ${data.map((item, index) => `
                                    <div onclick='exibirDetalhesPeloIndice(${index})' class="bg-[#1e1e1e] hover:bg-white/5 transition-all p-5 rounded-xl cursor-pointer shadow-lg">
                                        <div class="flex justify-between items-start mb-2">
                                            <span class="text-[9px] font-bold text-white uppercase tracking-widest">${item.assunto}</span>
                                            <span class="text-[8px] font-bold px-2 py-0.5 rounded bg-white/10 text-white/60">#${item.protocolo}</span>
                                        </div>
                                        <div class="flex justify-between items-center text-[10px]">
                                            <span class="text-white/40">${new Date(item.data).toLocaleDateString()}</span>
                                            <span class="px-2 py-0.5 rounded-full ${getStatusColor(item.status)} text-[8px] font-black uppercase tracking-widest border-none">${item.status}</span>
                                        </div>
                                    </div>
                                `).join('')}
                            </div>
                            <div class="pt-8 border-t border-white/5 flex flex-col md:flex-row items-center justify-between gap-6">
                                <button onclick="limparConsulta()" class="w-full md:w-auto bg-white text-black px-8 py-3 rounded-xl font-black text-[9px] uppercase tracking-widest transition-colors">Nova Consulta</button>
                            </div>
                        </div>
                    `;
                } else {
                    resultado.innerHTML = `
                        <div class="py-10 text-center bg-red-500/10 rounded-2xl">
                            <p class="text-[9px] font-bold text-red-400 uppercase tracking-widest font-black">${data.error || 'Nenhum chamado encontrado'}</p>
                            <button onclick="limparConsulta()" class="mt-4 text-[8px] text-white/50 hover:text-white uppercase tracking-widest transition-colors font-bold underscores underline">Tentar novamente</button>
                        </div>
                    `;
                }
            } catch (err) {
                resultado.innerHTML = '<p class="text-[9px] text-red-400 font-bold text-center py-10 capitalize">Falha na conexão com o servidor.</p>';
            }
        }

        function exibirDetalhesPeloIndice(index) {
            const item = window.resultadosBusca[index];
            exibirDetalhesChamado(item);
        }

        function exibirDetalhesChamado(item) {
            const formConsulta = document.getElementById('formConsulta');
            const resultado = document.getElementById('resultadoConsultaCentral');
            
            formConsulta.classList.add('hidden');
            
            // Gerar HTML da Timeline
            const timelineHTML = item.historico.map((h, index) => {
                const isFirst = index === 0;
                const isLast = index === item.historico.length - 1;
                const dateObj = new Date(h.data);
                const dateStr = dateObj.toLocaleDateString();
                const timeStr = dateObj.toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' });

                return `
                    <div class="relative flex gap-6 pb-8">
                        ${!isLast ? `<div class="absolute left-[7px] top-6 bottom-0 w-[2px] bg-white/5"></div>` : ''}
                        
                        <div class="relative z-10">
                            <div class="w-3.5 h-3.5 rounded-full ${isLast ? getDotColor(h.status) + ' shadow-[0_0_15px_rgba(255,255,255,0.1)]' : 'bg-white/10'} mt-1.5 transition-all"></div>
                        </div>

                        <div class="flex-1">
                            <div class="flex flex-col md:flex-row md:items-center justify-between gap-1 mb-1">
                                <span class="text-[10px] font-black uppercase tracking-widest ${isLast ? 'text-white' : 'text-slate-500'}">
                                    ${h.status}
                                </span>
                                <span class="text-[8px] font-bold text-slate-600 uppercase tracking-widest">
                                    ${dateStr} às ${timeStr}
                                </span>
                            </div>
                            <p class="text-[11px] leading-relaxed ${isLast ? 'text-slate-300' : 'text-slate-500 italic opacity-80'}">
                                ${h.observacao || 'Processando etapa...'}
                            </p>
                        </div>
                    </div>
                `;
            }).reverse().join(''); // Reverse para mostrar o mais recente no topo (estilo iFood)

            resultado.innerHTML = `
                <div class="animate-in fade-in slide-in-from-top-4 duration-500 pb-10">
                    <!-- Cabeçalho do Detalhe -->
                    <div class="mb-10 bg-white/5 p-6 rounded-2xl flex flex-col md:flex-row justify-between items-center gap-6">
                        <div class="text-center md:text-left">
                            <p class="text-[8px] font-black text-[#8D3046] uppercase tracking-[0.3em] mb-1">Assunto do Chamado</p>
                            <h4 class="text-xl font-bold text-white">${item.assunto}</h4>
                        </div>
                        <div class="text-center md:text-right">
                            <p class="text-[8px] font-black text-slate-500 uppercase tracking-[0.3em] mb-1">Nº Protocolo</p>
                            <span class="text-sm font-black text-white bg-black/40 px-3 py-1.5 rounded-lg border border-white/5">${item.protocolo}</span>
                            <div class="mt-2 text-[8px] font-black uppercase px-2 py-1 rounded inline-block ${getStatusColor(item.status)}">${item.status}</div>
                        </div>
                    </div>

                    <!-- Linha do Tempo -->
                    <div class="mb-10">
                        <h5 class="text-[10px] font-black text-white/30 uppercase tracking-[0.4em] mb-8 text-center md:text-left">Acompanhamento em Tempo Real</h5>
                        <div class="max-w-md mx-auto md:mx-0 px-4">
                            ${timelineHTML}
                        </div>
                    </div>

                    <div class="pt-8 border-t border-white/5 flex flex-col md:flex-row items-center justify-between gap-6">
                        <div class="flex flex-col gap-1 text-center md:text-left">
                            <p class="text-[8px] text-white/20 uppercase font-bold tracking-[0.2em]">Solicitante</p>
                            <p class="text-[10px] text-white/60 font-black uppercase tracking-widest">${item.nome}</p>
                        </div>
                        <div class="flex flex-col sm:flex-row items-center gap-4 w-full md:w-auto">
                            ${window.resultadosBusca && window.resultadosBusca.length > 1 ? `<button onclick="consultarChamadoCentral()" class="text-[9px] font-bold uppercase text-slate-500 hover:text-white transition-colors px-4">Voltar à lista</button>` : ''}
                            <div class="flex gap-3 w-full sm:w-auto">
                                ${item.status === 'Pendente' ? `<button onclick="prepararResolucao('${item.id}')" class="flex-1 sm:flex-none bg-amber-600/20 text-amber-500 border border-amber-600/30 px-6 py-3 rounded-xl font-black text-[9px] uppercase tracking-widest hover:bg-amber-600 hover:text-white transition-all shadow-lg shadow-amber-900/10">Resolver Pendência</button>` : ''}
                                <button onclick="limparConsulta()" class="flex-1 sm:flex-none bg-white text-black px-8 py-3 rounded-xl font-black text-[9px] uppercase tracking-widest transition-all hover:bg-slate-200 shadow-xl shadow-white/5">Nova Consulta</button>
                            </div>
                        </div>
                    </div>
                </div>
            `;
        }

        let arquivosSelecionadosR = [];
        function prepararResolucao(id) {
            console.log("Iniciando resolução para o ID:", id);
            const item = window.resultadosBusca.find(c => String(c.id) === String(id));
            if (!item) {
                console.error("Chamado não encontrado na busca local.");
                return;
            }

            alternarTela('resolver');
            
            // Preenche os campos
            document.getElementById('resolverId').value = item.id;
            document.getElementById('nomeR').value = item.nome;
            document.getElementById('cpfR').value = item.cpf;
            document.getElementById('emailR').value = item.email;
            document.getElementById('telefoneR').value = item.telefone;
            document.getElementById('numeroR').value = item.numero || '';
            document.getElementById('assuntoR').value = item.assunto;
            document.getElementById('categoria_idR').value = item.categoria_id || '';
            document.getElementById('descricaoR').value = item.descricao;
            
            arquivosSelecionadosR = [];
            document.getElementById('previewContainerR').innerHTML = '';
        }

        // --- Lógica do Form de Resolução ---
        document.getElementById('resolverForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const formData = new FormData(e.target);
            const id = formData.get('id');
            console.log("Enviando resolução para o chamado ID:", id);
            
            if (!id || id === 'undefined') {
                mostrarStatus("Erro: ID do chamado não identificado. Recarregue a página.", true);
                return;
            }

            // Adiciona arquivos do array global
            formData.delete('imagens');
            arquivosSelecionadosR.forEach(f => formData.append('imagens', f));

            try {
                mostrarStatus("Salvando alterações...");
                const response = await fetch(`/api/public/chamados/${id}/resolver`, {
                    method: 'PATCH',
                    body: formData
                });

                if (response.ok) {
                    mostrarStatus("Pendência resolvida com sucesso!");
                    setTimeout(() => {
                        alternarTela('consultar');
                        // Atualiza automaticamente a visualização do chamado
                        consultarChamadoCentral();
                    }, 1000);
                } else {
                    mostrarStatus("Erro ao salvar alterações.", true);
                }
            } catch (err) {
                mostrarStatus("Erro de conexão.", true);
            }
        });

        // Input de arquivos R
        document.getElementById('inputImagensR').addEventListener('change', function(e) {
            const novos = Array.from(e.target.files);
            arquivosSelecionadosR = [...arquivosSelecionadosR, ...novos];
            
            const container = document.getElementById('previewContainerR');
            container.innerHTML = arquivosSelecionadosR.map(f => `<div class="w-16 h-16 bg-white/5 rounded-lg flex items-center justify-center p-2 text-[8px] text-white/40 overflow-hidden">${f.name}</div>`).join('');
        });

        // --- SISTEMA DE CATEGORIAS DINÂMICAS ---
        let listaCategorias = [];
        async function loadCategorias() {
            const select = document.getElementById('assunto');
            const selectR = document.getElementById('assuntoR');
            try {
                const response = await fetch('/api/public/categorias');
                listaCategorias = await response.json();
                
                const htmlOpcoes = '<option value="" disabled selected class="text-slate-500">Selecione uma opção...</option>' + 
                    listaCategorias.map(cat => `<option value="${cat.nome}" data-id="${cat.id}">${cat.nome}</option>`).join('');
                
                select.innerHTML = htmlOpcoes;
                if (selectR) selectR.innerHTML = htmlOpcoes;

            } catch (err) {
                console.error("Erro categorias:", err);
            }
        }

        document.getElementById('assunto').addEventListener('change', function(e) {
            const selectedOption = e.target.options[e.target.selectedIndex];
            document.getElementById('categoria_id').value = selectedOption.dataset.id || '';
        });

        // INICIALIZAÇÃO
        loadCategorias();
    </script>
</body>
</html>
