<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login Agente - Helpdesk OAB</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet">
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        * { font-family: 'Inter', sans-serif; }
        input:-webkit-autofill {
            -webkit-box-shadow: 0 0 0 30px #1e1e1e inset !important;
            -webkit-text-fill-color: white !important;
        }
    </style>
</head>
<body class="bg-[#131313] min-h-screen flex items-center justify-center text-slate-200 font-inter">

    <div class="w-full max-w-md p-8">
        <div class="mb-10 text-center">
            <h2 class="text-white text-3xl font-bold tracking-tight">Painel do Agente</h2>
            <p class="text-slate-500 text-[10px] font-bold uppercase tracking-[0.3em] mt-3">Acesso Administrativo</p>
        </div>

        <div id="status" class="hidden p-4 text-xs font-semibold mb-6 rounded-lg"></div>

        <form id="loginForm" class="space-y-6">
            <div>
                <label class="block text-[10px] font-bold uppercase text-slate-400 tracking-widest mb-2">Usuário</label>
                <input type="text" id="usuario" required class="w-full bg-[#1e1e1e] rounded-xl px-4 py-4 text-sm text-white placeholder-slate-600 border-none outline-none">
            </div>

            <div>
                <label class="block text-[10px] font-bold uppercase text-slate-400 tracking-widest mb-2">Senha</label>
                <input type="password" id="senha" required class="w-full bg-[#1e1e1e] rounded-xl px-4 py-4 text-sm text-white placeholder-slate-600 border-none outline-none">
            </div>

            <button type="submit" class="w-full bg-white text-black py-4 rounded-xl font-black text-[10px] uppercase tracking-[0.2em] hover:bg-slate-200 transition-colors">
                Entrar
            </button>
        </form>
        
        <div class="mt-8 text-center">
            <a href="/" class="text-[10px] font-bold uppercase text-slate-500 hover:text-white transition-colors tracking-widest">Voltar ao Portal</a>
        </div>
    </div>

    <script>
        document.getElementById('loginForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const usuario = document.getElementById('usuario').value;
            const senha = document.getElementById('senha').value;
            const status = document.getElementById('status');

            try {
                const response = await fetch('/api/login', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ usuario, senha })
                });

                const data = await response.json();

                if (response.ok) {
                    localStorage.setItem('agente_token', data.token);
                    window.location.href = '/agente.html';
                } else {
                    status.textContent = data.message;
                    status.className = "p-4 text-xs font-semibold mb-6 rounded-lg bg-red-500/10 text-red-400";
                    status.classList.remove('hidden');
                }
            } catch (err) {
                status.textContent = "Erro na conexão.";
                status.className = "p-4 text-xs font-semibold mb-6 rounded-lg bg-red-500/10 text-red-400";
                status.classList.remove('hidden');
            }
        });
    </script>
</body>
</html>
